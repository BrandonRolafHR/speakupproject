<main>
    <section>
        <h1 id="contact-title">CONTACT</h1>

        <form action="#" method="post">
            <label for="naam">Naam*</label>
            <input id="naam" name="naam" type="text" placeholder="Voor- en Achternaam" required />

            <label for="email">Email*</label>
            <input id="email" name="email" type="email" placeholder="Email" required />

            <label for="telefoon">Telefoon</label>
            <input id="telefoon" name="telefoon" type="tel" placeholder="Telefoon" />

            <label for="onderwerp">Onderwerp*</label>
            <input id="onderwerp" name="onderwerp" type="text" placeholder="Onderwerp" required />

            <label for="bericht">Bericht*</label>
            <textarea id="bericht" name="bericht" placeholder="Bericht" rows="5" required></textarea>

            <button type="submit">Verzend</button>
        </form>
    </section>
</main>
